backend:
  name: github
  repo: riocinema/links
  branch: main
  base_url: https://decap-proxy.digital-250.workers.dev

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Rio Links Page"
    files:
      - name: "content"
        label: "Page Content"
        file: "content.json"
        format: "json"
        fields:
          - label: "Featured Links"
            name: "featured"
            widget: "list"
            summary: "{{fields.label}} — {{fields.title}}"
            fields:
              - { label: "🟢 Visible on Links Page", name: "active", widget: "boolean", default: true }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Colour"
                name: "color"
                widget: "select"
                options:
                  - { label: "Special Event / Q&A — Green", value: "special" }
                  - { label: "Classic Matinee — Purple", value: "classic-matinee" }
                  - { label: "Carers & Babies — Baby Pink", value: "carers-babies" }
                  - { label: "Hard of Hearing — Blue", value: "hard-of-hearing" }
                  - { label: "Pink Palace — Pink", value: "pink-palace" }
                  - { label: "Family Flicks — Yellow", value: "family-flicks" }
                  - { label: "Rio Forever — Red", value: "rio-forever" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Star", value: "star" }
                  - { label: "Newspaper", value: "newspaper" }
                  - { label: "Mail", value: "mail" }
                  - { label: "Shopping Bag", value: "shopping_bag" }
                  - { label: "Ticket / Voucher", value: "confirmation_number" }
                  - { label: "Campaign", value: "campaign" }
                  - { label: "Groups", value: "groups" }
                  - { label: "Heart", value: "favorite" }
                  - { label: "Celebration", value: "celebration" }
                  - { label: "Volunteer / Support", value: "volunteer_activism" }
                  - { label: "Movie", value: "movie" }
                  - { label: "Local Movies", value: "local_movies" }
                  - { label: "Calendar Event", value: "event" }

          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{fields.title}} — {{fields.eventDate}} {{fields.time}}"
            fields:
              - { label: "🟢 Visible on Links Page", name: "active", widget: "boolean", default: true }
              - { label: "📌 Pin Above Other Events", name: "pinned", widget: "boolean", default: false }
              - {
                  label: "Event Date",
                  name: "eventDate",
                  widget: "datetime",
                  hint: "This event automatically disappears after its start date and time.",
                  date_format: "YYYY-MM-DD",
                  time_format: false,
                  format: "YYYY-MM-DD"
                }
              - {
                  label: "Time",
                  name: "time",
                  widget: "string",
                  hint: "24-hour format only, e.g. 18:30. Used for display and automatic expiry.",
                  pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "Use 24-hour time, e.g. 18:30"]
                }
              - { label: "Strand", name: "strand", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "BBFC Rating"
                name: "rating"
                widget: "select"
                required: false
                options:
                  - { label: "No rating", value: "" }
                  - { label: "U", value: "U" }
                  - { label: "PG", value: "PG" }
                  - { label: "12A", value: "12A" }
                  - { label: "15", value: "15" }
                  - { label: "18", value: "18" }
                  - { label: "Not Rated / NR", value: "NR" }
              - { label: "Extra Line", name: "extra", widget: "string", required: false }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Colour"
                name: "color"
                widget: "select"
                options:
                  - { label: "Special Event / Q&A — Green", value: "special" }
                  - { label: "Classic Matinee — Purple", value: "classic-matinee" }
                  - { label: "Carers & Babies — Baby Pink", value: "carers-babies" }
                  - { label: "Hard of Hearing — Blue", value: "hard-of-hearing" }
                  - { label: "Pink Palace — Pink", value: "pink-palace" }
                  - { label: "Family Flicks — Yellow", value: "family-flicks" }
                  - { label: "Rio Forever — Red", value: "rio-forever" }

          - label: "Find Out More Links"
            name: "moreLinks"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "🟢 Visible on Links Page", name: "active", widget: "boolean", default: true }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Star", value: "star" }
                  - { label: "Newspaper", value: "newspaper" }
                  - { label: "Mail", value: "mail" }
                  - { label: "Shopping Bag", value: "shopping_bag" }
                  - { label: "Ticket / Voucher", value: "confirmation_number" }
                  - { label: "Campaign", value: "campaign" }
                  - { label: "Groups", value: "groups" }
                  - { label: "Heart", value: "favorite" }
                  - { label: "Celebration", value: "celebration" }
                  - { label: "Volunteer / Support", value: "volunteer_activism" }
                  - { label: "Movie", value: "movie" }
                  - { label: "Local Movies", value: "local_movies" }
                  - { label: "Calendar Event", value: "event" }
